services:
  api_node:
    container_name: node_api
    build:
      context: .
      dockerfile: src/Dockerfile
    image: cloud_administration_node_api
    networks:
      - netflix_net
    depends_on:
      - mongodb

  mongodb:
    container_name: mongodb
    image: mongo
    networks:
      - netflix_net
    volumes:
      - mongo-data:/data/db
      - ./data/dataset_films_series.csv:/import.csv

  redis:
    container_name: redis
    image: redis:7
    networks:
      - netflix_net
    ports:
      - "6379:6379"
  
  load-test:
    container_name: load_test
    build:
      context: ./tests/load
      dockerfile: Dockerfile
    image: cloud_administration_load_test
    volumes:
      - ./tests:/tests
    command: python /tests/load/stress_test.py
    networks:
      - netflix_net
    depends_on:
      - api_node

networks:
  netflix_net:
    driver: bridge

volumes:
  mongo-data:
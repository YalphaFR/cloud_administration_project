services:
  api_node:
    container_name: node_api
    build: ./src
    image: node_api_image
    ports:
      - "3000:3000"
    networks:
      - netflix_net
    depends_on:
      - mongodb

  mongodb:
    container_name: mongodb
    image: mongo
    networks:
      - netflix_net
    volumes:
      - mongo-data:/data/db
      - ./dataset_films_series.csv:/import.csv

networks:
  netflix_net:
    driver: bridge

volumes:
  mongo-data: